<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust & Safety Routing Engine</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function TSDashboard() {
            const [text, setText] = React.useState('');
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const analyzeComment = async () => {
                if (!text) return;
                setLoading(true);
                
                try {
                    // Send the text to your local Flask API!
                    const response = await fetch('http://127.0.0.1:5000/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment_text: text })
                    });
                    
                    const data = await response.json();
                    setResult(data);
                } catch (error) {
                    alert("Error connecting to the API. Is your Flask server running?");
                }
                setLoading(false);
            };

            return (
                <div class="max-w-3xl mx-auto mt-12 p-6 bg-white rounded-lg shadow-xl border border-slate-200">
                    <h1 class="text-2xl font-bold text-slate-800 border-b pb-4 mb-6">🛡️ Trust & Safety: Classifier-Based Routing</h1>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-slate-600 mb-2">Simulate User Comment</label>
                        <textarea 
                            class="w-full p-4 border rounded-md bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            rows="4"
                            placeholder="Type a test comment here..."
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                        ></textarea>
                    </div>

                    <button 
                        onClick={analyzeComment}
                        disabled={loading}
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200"
                    >
                        {loading ? 'Analyzing...' : 'Run ML Classifier & Route Ticket'}
                    </button>

                    {result && (
                        <div class="mt-8 p-6 bg-slate-50 rounded-lg border border-slate-200">
                            <h2 class="text-lg font-bold text-slate-800 mb-4">System Output</h2>
                            
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div class="bg-white p-4 rounded border shadow-sm">
                                    <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Predicted Policy</p>
                                    <p class="text-xl font-bold text-slate-800 mt-1">{result.predicted_policy.toUpperCase()}</p>
                                </div>
                                <div class="bg-white p-4 rounded border shadow-sm">
                                    <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">AI Confidence</p>
                                    <p class="text-xl font-bold text-slate-800 mt-1">{result.confidence_score}%</p>
                                </div>
                            </div>

                            <div class="bg-white p-4 rounded border shadow-sm border-l-4 border-l-blue-500">
                                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Action Taken</p>
                                <p class="text-lg font-bold text-blue-700 mt-1">{result.assigned_queue}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TSDashboard />);
    </script>
</body>
</html>
